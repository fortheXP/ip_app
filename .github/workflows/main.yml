name: CI/CD pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: forthexp/ip-app
  HELM_RELEASE: ip-app
  HELM_CHART_PATH: ./charts
  K8S_NAMESPACE: default
permissions:
  contents: read
  packages: write
  id-token: write    

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      
      - name: Install linters
        run: pip install ruff

      - name: Lint python code
        run: ruff check app/

      - name: Format check
        run: ruff format --check app/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r app/requirement.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  helm-lint:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: Azure/setup-helm@v3

      - name: Lint Helm chart
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Template validate 
        run: helm template test-release ${{ env.HELM_CHART_PATH }} > /dev/null

  security-scan:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps: 
      - uses: actions/checkout@v6

      - name: Build image for scanning
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with: 
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  build:
    runs-on: ubuntu-latest
    needs: [ test, helm-lint, security-scan ]
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write     
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume:    arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_IAM_ROLE_NAME }}
          aws-region:        ${{ secrets.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --kubeconfig $HOME/.kube/config

      - name: Debug caller identity
        run: aws sts get-caller-identity

      - name: Debug kubeconfig
        run: |
          kubectl config view
          kubectl config current-context
          
      - name: Test cluster connection
        run: kubectl get nodes
      
      - name: Set up Helm
        uses: Azure/setup-helm@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  
          
      - name: Helm upgrade / install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --wait \
            --timeout 5m \
            --rollback-on-failure

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=3m

      - name: Smoke test
        run: |
          ENDPOINT=$(kubectl get ingress ${{ env.HELM_RELEASE }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f http://$ENDPOINT/health
          curl -f http://$ENDPOINT/ready
          curl -f http://$ENDPOINT/

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Deployment succeeded',
              context: 'deploy/eks'
            })

      - name: Notify failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Deployment failed',
              context: 'deploy/eks'
            })
